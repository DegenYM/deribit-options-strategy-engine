# Investor manifest: one row per Deribit sub-account (typically ≤ 3 strategies).
# Copy _example/ to config/investors/<your_id>/ and fill accounts/.env.<slug> from *.example.
# risk_tier defaults to medium; set risk_tier = "low" | "high" only when needed.

[investor]
id = "demo"
display_name = "Demo Investor"

[[accounts]]
slug = "covered_call"
strategy = "covered_call"
display_name = "Covered call (BTC/ETH inventory)"
enabled = true
# live_enabled = false  # optional: keep on dashboard but skip run_live_profiles / launchd live

[[accounts]]
slug = "naked"
strategy = "naked_short"
display_name = "Naked short (USDC linear)"
enabled = true

[[accounts]]
slug = "bull_put"
strategy = "bull_put_spread"
display_name = "Bull put spread"
enabled = true
