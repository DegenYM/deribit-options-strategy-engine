# Investor handoff — fill and deliver via a secure channel (not chat plaintext).
# Manager: ./bot investor import-handoff path/to/handoff.toml
#
# Fee payment: investor sends USDC/USDT/USDE to manager addresses in
# config/platform/fee-payout-addresses.toml (not Deribit internal transfer).

[investor]
id = "alice"
display_name = "Alice"
dashboard_email = "alice@example.com"
deribit_env = "mainnet"  # must be quoted in TOML

[[strategies]]
slug = "naked"
client_id = "YOUR_CLIENT_ID"
client_secret = "YOUR_CLIENT_SECRET"
reference_capital_usdc = 50000

# Optional additional strategies (must exist in accounts.toml from investor init)
# [[strategies]]
# slug = "covered_call"
# client_id = "..."
# client_secret = "..."

[checklist]
margin_segregated = true
